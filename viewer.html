<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>3D Viewer</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script></head>
<body><h1 id="title"></h1><model-viewer id="viewer" camera-controls auto-rotate style="width:100%;height:70vh"></model-viewer>
<p id="desc"></p><script src="./data/collection.js"></script><script>
const id=new URLSearchParams(location.search).get('id');
const a=collection.find(x=>x.id===id);
title.textContent=a.name; desc.textContent=a.longDescription; viewer.src=a.model;
</script></body></html>
